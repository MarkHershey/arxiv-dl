name: CI

on:
    push:
        branches:
            - master
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version:
                    - "3.9"
                    - "3.13"
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install uv and Python
              uses: astral-sh/setup-uv@v8
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}

            - name: Run unit tests
              run: uv run --extra dev pytest
